services:
  shrimp:
    build:
      context: .
    restart: "no"
    volumes:
      - "${SHRIMP_DATA_DIR:-./data/shrimp}:/var/lib/shrimp"
      - "${SHRIMP_MCP_CONFIG:-./data/.mcp.json}:/app/.mcp.json:ro"
    develop:
      watch:
        - action: sync+restart
          path: ./dist
          target: /app/dist
