services:
  shrimp:
    image: ghcr.io/elct9620/shrimp:latest
    container_name: shrimp
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - "${SHRIMP_DATA_DIR:-./data/shrimp}:/var/lib/shrimp"
      # Custom Agent Skills (see SPEC §Skills Layout):
      # Drop skill directories under ${SHRIMP_DATA_DIR}/skills/ on the host;
      # they are discovered at container start as SHRIMP_HOME/skills/. The
      # directory is optional — absent means only built-in skills are active.
      # Optional: mount a host .mcp.json into the container's project root so
      # MCP server configuration survives image rebuilds. Uncomment and ensure
      # the host file exists (e.g. `touch .mcp.json`) before starting the stack.
      # - "${SHRIMP_MCP_CONFIG:-./.mcp.json}:/app/.mcp.json:ro"
    restart: unless-stopped
